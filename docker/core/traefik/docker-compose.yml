# docker-compose.yml
services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    env_file:
      - ./.env.traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-dash.rule=Host(`traefik.${DOMAIN_NAME}`)
      - traefik.http.routers.traefik-dash.service=api@internal
      - traefik.http.routers.traefik-dash.entrypoints=websecure
      - traefik.http.routers.traefik-dash.tls=true
      - traefik.http.routers.traefik-dash.tls.certresolver=cloudflare
      - traefik.http.routers.traefik-dash.middlewares=authentik@docker
      - traefik.http.services.traefik-dash.loadbalancer.server.port=8080
      - gatus.path=/ping
      - homepage.group=Infrastructure
      - homepage.name=Traefik
      - homepage.icon=traefik
      - homepage.href=https://traefik.${DOMAIN_NAME}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./config/certs/:/var/traefik/certs/:rw
      - ./config/conf/:/etc/traefik/conf/:ro
    networks:
      - proxy-cloudflare
      - proxy-authentik
      - proxy-gatus
      - proxy-homepage
      - proxy-whoami
      - proxy-capy
networks:
  proxy-cloudflare:
    external: true
  proxy-authentik:
    external: true
  proxy-gatus:
    external: true
  proxy-homepage:
    external: true
  proxy-whoami:
    external: true
  proxy-capy:
    external: true
